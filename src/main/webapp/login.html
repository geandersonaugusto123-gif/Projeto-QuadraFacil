<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | QuadraF&aacute;cil</title>
  <meta name="description" content="Acesse sua conta no QuadraFacil para gerenciar agendamentos de quadras esportivas.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <main class="login-shell" aria-labelledby="login-title">
    <section class="login-panel" aria-label="Acesso ao sistema">
      <a class="login-brand" href="index.html" aria-label="Voltar para a pagina inicial do QuadraFacil">
        <span class="brand__mark" aria-hidden="true">QF</span>
        <span class="brand__name">QuadraF&aacute;cil</span>
      </a>

      <div class="login-heading">
        <p class="eyebrow">Acesso do usu&aacute;rio</p>
        <h1 id="login-title">Entrar na sua conta</h1>
        <p>Acesse para gerenciar seus agendamentos.</p>
      </div>

      <form class="login-form" id="login-form" novalidate>
        <div class="form-alert" id="login-message" role="status" aria-live="polite" hidden></div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" placeholder="seu@email.com" required>
          <small class="field-error" id="email-error"></small>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" autocomplete="current-password" placeholder="Digite sua senha" required minlength="6">
          <small class="field-error" id="senha-error"></small>
        </div>

        <div class="form-row">
          <label class="remember-option" for="lembrar-acesso">
            <input type="checkbox" id="lembrar-acesso" name="lembrarAcesso">
            <span>Lembrar acesso</span>
          </label>

          <a class="text-link" href="#" aria-disabled="true">Esqueci minha senha</a>
        </div>

        <button class="button button--primary login-submit" type="submit">
          <span class="button-text">Entrar</span>
        </button>
      </form>

      <p class="login-register">
        Ainda n&atilde;o tem conta?
        <a class="text-link" href="cadastro.html">Cadastre-se</a>
      </p>
    </section>

    <aside class="login-support" aria-label="Dados de teste">
      <div class="support-card">
        <span class="support-card__tag">Ambiente acad&ecirc;mico</span>
        <h2>Dados de teste</h2>
        <dl class="test-credentials">
          <div>
            <dt>Administrador</dt>
            <dd>admin@quadras.com.br</dd>
            <dd>admin123</dd>
          </div>
          <div>
            <dt>Usu&aacute;rio</dt>
            <dd>joao@email.com</dd>
            <dd>senha123</dd>
          </div>
        </dl>
      </div>
    </aside>
  </main>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
