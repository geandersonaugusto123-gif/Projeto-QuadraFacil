<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | QuadraF&aacute;cil</title>
  <meta name="description" content="Crie sua conta no QuadraFacil para reservar quadras esportivas.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="register-page">
  <header class="auth-header">
    <a class="brand" href="index.html" aria-label="QuadraFacil inicio">
      <span class="brand__mark" aria-hidden="true">QF</span>
      <span class="brand__name">QuadraF&aacute;cil</span>
    </a>

    <a class="auth-header__link" href="login.html">J&aacute; tenho conta</a>
  </header>

  <main class="register-shell" aria-labelledby="register-title">
    <section class="register-card" aria-label="Formulario de cadastro">
      <div class="login-heading">
        <p class="eyebrow">Novo cadastro</p>
        <h1 id="register-title">Crie sua conta</h1>
        <p>Cadastre-se para reservar quadras esportivas.</p>
      </div>

      <form class="register-form" id="register-form" novalidate>
        <div class="form-alert" id="register-message" role="status" aria-live="polite" hidden></div>

        <div class="form-group">
          <label for="nome">Nome completo</label>
          <div class="field-control">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 21a8 8 0 0 0-16 0"></path>
              <circle cx="12" cy="8" r="4"></circle>
            </svg>
            <input type="text" id="nome" name="nome" autocomplete="name" placeholder="Seu nome completo" required>
          </div>
          <small class="field-error" id="nome-error"></small>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="email">Email</label>
            <div class="field-control">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <path d="m3 7 9 6 9-6"></path>
              </svg>
              <input type="email" id="email" name="email" autocomplete="email" placeholder="seu@email.com" required>
            </div>
            <small class="field-error" id="email-error"></small>
          </div>

          <div class="form-group">
            <label for="telefone">Telefone</label>
            <div class="field-control">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.9a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.9.3 1.9.6 2.9.7a2 2 0 0 1 1.7 2Z"></path>
              </svg>
              <input type="tel" id="telefone" name="telefone" autocomplete="tel" placeholder="(11) 99999-9999">
            </div>
            <small class="field-error" id="telefone-error"></small>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="senha">Senha</label>
            <div class="field-control">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="11" width="16" height="10" rx="2"></rect>
                <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
              </svg>
              <input type="password" id="senha" name="senha" autocomplete="new-password" placeholder="Minimo de 6 caracteres" required minlength="6">
            </div>
            <small class="field-error" id="senha-error"></small>
          </div>

          <div class="form-group">
            <label for="confirmar-senha">Confirmar senha</label>
            <div class="field-control">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 6 9 17l-5-5"></path>
              </svg>
              <input type="password" id="confirmar-senha" name="confirmarSenha" autocomplete="new-password" placeholder="Repita sua senha" required minlength="6">
            </div>
            <small class="field-error" id="confirmar-senha-error"></small>
          </div>
        </div>

        <div class="register-actions">
          <button class="button button--primary register-submit" type="submit">
            <span class="button-text">Cadastrar</span>
          </button>
          <a class="button button--secondary-soft" href="login.html">J&aacute; tenho conta</a>
        </div>
      </form>
    </section>

    <aside class="register-visual" aria-label="Organizacao de reservas">
      <div class="court-illustration" aria-hidden="true">
        <div class="court-line court-line--center"></div>
        <div class="court-line court-line--left"></div>
        <div class="court-line court-line--right"></div>
        <div class="court-circle"></div>
      </div>

      <div class="schedule-note">
        <span class="schedule-note__day">Hoje</span>
        <strong>18:00</strong>
        <span>Quadra dispon&iacute;vel</span>
      </div>
    </aside>
  </main>

  <script src="js/api.js"></script>
  <script src="js/cadastro.js"></script>
</body>
</html>
